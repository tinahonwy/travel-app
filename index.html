<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, viewport-fit=cover">
<title>一起去旅行</title>
<link rel="icon" type="image/png" href="./LOGOJ-4.png">
<link rel="apple-touch-icon" sizes="180x180" href="./LOGOJ-4.png">
<meta name="apple-mobile-web-app-title" content="一起去旅行">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@500;600;700&family=Noto+Sans+TC:wght@400;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/10.12.2/firebase-app-compat.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/10.12.2/firebase-auth-compat.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/10.12.2/firebase-firestore-compat.min.js"></script>
<style>
  :root{
    --paper:#F7F3EA; --paper-card:#FFFFFF;
    --ink:#1B3A4B; --ink-soft:#3E5A6B;
    --vermillion:#C1440E; --vermillion-soft:#E9E1D3;
    --matcha:#6E7F3C; --muted:#8A8272; --border:#E4DDCB; --danger:#B3261E;
    --font-display:"Noto Serif TC",serif;
    --font-body:"Noto Sans TC",sans-serif;
    --font-mono:"JetBrains Mono",ui-monospace,monospace;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;width:100%;max-width:100%;overflow-x:hidden;position:relative;background:var(--paper);color:var(--ink);font-family:var(--font-body);-webkit-font-smoothing:antialiased;}
  .hidden{display:none !important;}
  button{font-family:var(--font-body);cursor:pointer;}
  a{color:var(--vermillion);}
  input,select,textarea{font-family:var(--font-body);}

  .top-bar{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;background:var(--ink);color:var(--paper);gap:8px;}
  .top-bar .brand{font-family:var(--font-display);font-size:17px;display:flex;align-items:center;gap:6px;white-space:nowrap;flex-shrink:0;}
  .top-bar .brand .stamp{display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;border-radius:50%;border:1.5px solid var(--vermillion);color:var(--vermillion);font-size:11px;font-family:var(--font-display);flex-shrink:0;}
  .top-bar .user-info{display:flex;align-items:center;gap:8px;font-size:13px;opacity:.9;min-width:0;flex-shrink:1;}
  .top-bar button.ghost{background:transparent;border:1px solid rgba(247,243,234,.4);color:var(--paper);padding:6px 12px;border-radius:999px;font-size:12.5px;flex-shrink:0;white-space:nowrap;}
  .top-bar button.ghost:hover{border-color:var(--paper);}
  .profile-trigger{display:flex;align-items:center;gap:6px;background:none;border:none;color:var(--paper);font-family:var(--font-body);font-size:13px;cursor:pointer;padding:0;min-width:0;max-width:100px;}
  .profile-trigger span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0;}
  .profile-trigger:hover{opacity:.85;}
  .avatar-mini{width:26px;height:26px;border-radius:50%;object-fit:cover;flex-shrink:0;border:1.5px solid rgba(247,243,234,.5);}
  .avatar-chip{border-radius:50%;object-fit:cover;vertical-align:middle;margin-right:5px;flex-shrink:0;border:1px solid var(--border);background:#fff;}
  .avatar-mini-fallback{width:26px;height:26px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-size:12px;font-weight:600;color:#fff;}

  .modal-overlay{position:fixed;inset:0;background:rgba(27,58,75,.5);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;overflow-y:auto;}
  .modal-card{background:var(--paper-card);border-radius:18px;padding:24px;max-width:360px;width:100%;margin:auto;box-shadow:0 10px 40px rgba(27,58,75,.25);}
  .modal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
  .modal-head h3{margin:0;}
  .modal-close{background:none;border:none;font-size:16px;color:var(--muted);cursor:pointer;padding:2px 6px;}
  .modal-close:hover{color:var(--vermillion);}
  .avatar-edit{display:flex;flex-direction:column;align-items:center;gap:10px;margin-bottom:18px;}
  .avatar-preview{width:88px;height:88px;border-radius:50%;background:var(--vermillion-soft);display:flex;align-items:center;justify-content:center;overflow:hidden;font-size:30px;font-weight:700;color:var(--vermillion);font-family:var(--font-display);}
  .avatar-preview img{width:100%;height:100%;object-fit:cover;}
  .color-picker{display:flex;flex-wrap:wrap;gap:10px;padding:2px 0;}
  .color-swatch{width:32px;height:32px;border-radius:50%;border:2px solid transparent;cursor:pointer;padding:0;position:relative;}
  .color-swatch.selected{border-color:var(--ink);box-shadow:0 0 0 2px var(--paper-card),0 0 0 4px var(--ink);}
  .color-swatch.taken{opacity:.25;cursor:not-allowed;}

  #root{max-width:100%;overflow-x:hidden;}
  .container{max-width:720px;margin:0 auto;padding:28px 18px 70px;}
  .container.has-tabbar{padding-bottom:90px;}

  h1,h2,h3{font-family:var(--font-display);font-weight:600;margin:0 0 6px;}
  h1{font-size:26px;} h2{font-size:19px;}
  .eyebrow{font-size:12px;letter-spacing:.12em;color:var(--vermillion);text-transform:uppercase;display:block;margin-bottom:4px;}
  .subtitle{color:var(--muted);font-size:13.5px;margin:0 0 20px;}

  .card{background:var(--paper-card);border:1px solid var(--border);border-radius:14px;padding:18px;margin-bottom:16px;}
  .card-row{display:flex;align-items:center;justify-content:space-between;gap:12px;}

  .field{margin-bottom:14px;min-width:0;}
  .field label{display:block;font-size:12.5px;color:var(--ink-soft);margin-bottom:5px;}
  .field input,.field select,.field textarea{width:100%;min-width:0;-webkit-min-logical-width:0;box-sizing:border-box;padding:10px 12px;border:1px solid var(--border);border-radius:8px;font-size:14px;background:var(--paper);color:var(--ink);}
  .date-wrap{position:relative;overflow:hidden;border-radius:8px;border:1px solid var(--border);background:var(--paper);max-width:100%;}
  .date-wrap input[type="date"]{border:none;background:transparent;width:100%;min-width:0;-webkit-min-logical-width:0;box-sizing:border-box;padding:10px 12px;font-size:14px;color:var(--ink);display:block;-webkit-appearance:none;appearance:none;}
  .date-wrap input[type="date"]:focus{outline:none;}
  .field input:focus,.field select:focus,.field textarea:focus{outline:2px solid var(--ink-soft);outline-offset:1px;}
  .field-row{display:flex;gap:12px;}
  .field-row .field{flex:1;}
  .checkbox-row{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--ink-soft);margin-bottom:6px;}

  .btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:10px 18px;border-radius:999px;border:none;font-size:14px;font-weight:600;}
  .btn:active{transform:scale(.97);}
  .btn-primary{background:var(--ink);color:var(--paper);}
  .btn-accent{background:var(--vermillion);color:#fff;}
  .btn-outline{background:transparent;border:1px solid var(--ink);color:var(--ink);}
  .btn-danger{background:transparent;color:var(--danger);font-size:12.5px;padding:4px 8px;border:none;}
  .btn-block{width:100%;}

  .tabbar{position:fixed;bottom:0;left:0;right:0;background:var(--paper-card);border-top:1px solid var(--border);display:flex;justify-content:center;z-index:60;box-shadow:0 -2px 12px rgba(27,58,75,.06);}
  .tabbar-inner{max-width:720px;width:100%;display:flex;}
  .tab-btn{flex:1;background:transparent;border:none;padding:10px 4px 8px;font-size:11.5px;color:var(--muted);display:flex;flex-direction:column;align-items:center;gap:3px;white-space:nowrap;}
  .tab-btn .tab-ic{font-size:19px;}
  .tab-btn.active{color:var(--vermillion);font-weight:600;}

  .day-block{margin-bottom:18px;}
  .day-header{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:8px;flex-wrap:wrap;gap:6px;}
  .date-tag{font-family:var(--font-mono);font-size:11.5px;color:var(--vermillion);background:var(--vermillion-soft);padding:3px 8px;border-radius:6px;margin-right:8px;}
  .item-row{display:flex;gap:12px;padding:9px 0;border-bottom:1px dashed var(--border);}
  .edit-btn{background:transparent;color:var(--matcha);font-size:12px;padding:2px 4px;border:none;cursor:pointer;text-decoration:underline;}
  .item-actions{display:flex;flex-direction:column;gap:6px;align-items:flex-end;flex-shrink:0;}
  .item-btn{display:inline-flex;align-items:center;justify-content:center;padding:6px 16px;border-radius:999px;border:none;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;min-width:56px;}
  .item-btn:active{transform:scale(.96);}
  .item-btn-edit{background:#E8EFDD;color:var(--matcha);}
  .item-btn-del{background:#FBEAE7;color:var(--danger);}
  .edit-item-form{background:var(--paper);border:1px dashed var(--border);border-radius:10px;padding:12px;margin:6px 0;}
  .item-row:last-child{border-bottom:none;}
  .item-time{font-family:var(--font-mono);font-size:12.5px;color:var(--ink-soft);width:44px;flex-shrink:0;padding-top:2px;}
  .item-body{flex:1;min-width:0;}
  .item-title{font-weight:600;font-size:13.5px;}
  .item-note{font-size:12.5px;color:var(--muted);margin-top:2px;}
  .item-link{font-size:11.5px;display:inline-flex;align-items:center;gap:4px;margin-top:4px;}
  .item-link .link-ic{font-size:12px;line-height:1;}

  .balance-list{list-style:none;padding:0;margin:0;}
  .balance-list li{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px dashed var(--border);font-size:13.5px;}
  .balance-list li:last-child{border-bottom:none;}
  .amount-positive{color:var(--matcha);font-family:var(--font-mono);}
  .amount-negative{color:var(--vermillion);font-family:var(--font-mono);}
  .amount-neutral{color:var(--muted);font-family:var(--font-mono);}
  .settle-row{display:flex;align-items:center;gap:8px;font-size:13.5px;padding:7px 0;flex-wrap:wrap;}
  .settle-check{display:inline-flex;align-items:center;gap:6px;font-size:12.5px;color:var(--matcha);cursor:pointer;user-select:none;padding:4px 10px 4px 6px;border-radius:999px;background:#E8EFDD;}
  .settle-check input[type="checkbox"]{width:18px;height:18px;accent-color:var(--matcha);cursor:pointer;margin:0;}
  .settle-check.disabled{background:var(--vermillion-soft);color:var(--muted);cursor:default;}
  .settle-check.disabled input[type="checkbox"]{accent-color:var(--muted);cursor:not-allowed;}
  .settle-arrow{color:var(--muted);}

  .expense-row,.record-row{display:flex;justify-content:space-between;align-items:flex-start;padding:11px 0;border-bottom:1px solid var(--border);gap:10px;}
  .expense-row:last-child,.record-row:last-child{border-bottom:none;}
  .expense-block{border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:10px;background:var(--paper);}
  .expense-block:last-child{margin-bottom:0;}
  .expense-block-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;}
  .expense-block .item-actions{flex-direction:row;justify-content:flex-end;margin-top:10px;}
  .expense-meta,.record-meta{font-size:11.5px;color:var(--muted);margin-top:2px;}
  .expense-amount{font-family:var(--font-mono);font-weight:600;white-space:nowrap;}
  .visibility-badge{font-size:10.5px;padding:2px 8px;border-radius:999px;margin-left:6px;}
  .visibility-badge.public{background:#E8EFDD;color:var(--matcha);}
  .visibility-badge.private{background:#F1EAE0;color:var(--muted);}

  .empty-state{text-align:center;padding:36px 16px;color:var(--muted);font-size:13.5px;}
  .message{padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:14px;}
  .message.error{background:#FBEAE7;color:var(--danger);}
  .message.success{background:#E8EFDD;color:var(--matcha);}

  .auth-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
  .auth-card{max-width:380px;width:100%;background:var(--paper-card);border:1px solid var(--border);border-radius:18px;padding:34px 28px;}
  .auth-card h1{text-align:center;margin-bottom:4px;}
  .auth-card .subtitle{text-align:center;}
  .auth-toggle{text-align:center;font-size:13px;margin-top:14px;color:var(--muted);}
  .auth-toggle a{cursor:pointer;text-decoration:underline;}

  .trip-code{font-family:var(--font-mono);font-size:12.5px;background:var(--paper);border:1px dashed var(--border);padding:6px 10px;border-radius:6px;display:inline-flex;align-items:center;gap:8px;color:var(--ink-soft);margin-bottom:18px;max-width:100%;flex-wrap:wrap;word-break:break-all;}

  @media (max-width:600px){
    .container{padding:20px 12px 60px;}
    .field-row{flex-direction:column;gap:0;}
  }
</style>
</head>
<body>
<div id="topBar" class="top-bar hidden">
  <div class="brand"><span class="stamp">旅</span> 一起去旅行</div>
  <div class="user-info">
    <button class="profile-trigger" id="profileBtn"></button>
    <button id="logoutBtn" class="ghost">登出</button>
  </div>
</div>
<div id="root"></div>

<script>
/* ============================================================
   把這裡換成你自己在 Firebase Console 拿到的 firebaseConfig
   ============================================================ */
const firebaseConfig = {
  apiKey: "AIzaSyAtMm_FyE_wlduD-T-dpGJSJTduoJhhDi4",
  authDomain: "travel-app-d60a2.firebaseapp.com",
  projectId: "travel-app-d60a2",
  storageBucket: "travel-app-d60a2.firebasestorage.app",
  messagingSenderId: "421219269881",
  appId: "1:421219269881:web:64af48d9def28394857628",
  measurementId: "G-QRTP15451X"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

// ------------------------------------------------------------
// 全域狀態
// ------------------------------------------------------------
let currentUser = null;
let currentProfile = null;
let currentTrip = null;
let currentMembers = [];
let activeTab = 'itinerary';
let authMode = 'login';

const root = document.getElementById('root');
const topBar = document.getElementById('topBar');
const profileBtn = document.getElementById('profileBtn');

// ------------------------------------------------------------
// 大頭貼 / 代表色
// ------------------------------------------------------------
const PALETTE = ["#C1440E","#1B3A4B","#6E7F3C","#8B5E3C","#3E7CB1","#B3261E","#4C8C6B","#8B5A82"];
const DEFAULT_AVATAR = './LOGOJ-4.png';
function avatarSrc(member){ return (member && member.avatar) ? member.avatar : DEFAULT_AVATAR; }
function avatarChipHTML(member, size){
  const s = size || 20;
  return `<img class="avatar-chip" src="${avatarSrc(member)}" style="width:${s}px;height:${s}px;">`;
}
function memberOf(uid){ return currentMembers.find(m=>m.uid===uid); }
function colorOf(profile){
  if(profile && profile.color) return profile.color;
  const name = (profile && (profile.displayName||profile.email)) || '';
  let h = 0;
  for(let i=0;i<name.length;i++){ h = (h*31 + name.charCodeAt(i)) % 997; }
  return PALETTE[h % PALETTE.length];
}
function renderTopBar(){
  if(!currentProfile) return;
  profileBtn.innerHTML = `<img class="avatar-mini" src="${avatarSrc(currentProfile)}">`;
  profileBtn.innerHTML += `<span>${esc(currentProfile.displayName || currentProfile.email)}</span>`;
}
function openProfileModal(){
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  const initialColor = colorOf(currentProfile);
  const takenColors = currentMembers.filter(m=>!isMe(m.uid) && m.color).map(m=>m.color);
  overlay.innerHTML = `
    <div class="modal-card">
      <div class="modal-head">
        <h3>編輯個人資料</h3>
        <button class="modal-close" id="closeProfileModal">✕</button>
      </div>
      <div class="avatar-edit">
        <div class="avatar-preview" id="avatarPreview">
          <img src="${avatarSrc(currentProfile)}">
        </div>
        <button class="btn btn-outline" id="chooseAvatarBtn" style="width:auto;padding:6px 16px;font-size:13px;">上傳頭像</button>
        <input type="file" id="avatarInput" accept="image/*" style="display:none">
      </div>
      <div class="field">
        <label>暱稱</label>
        <input type="text" id="profileNameInput" value="${esc(currentProfile.displayName||'')}" maxlength="20">
      </div>
      <div class="field">
        <label>代表色</label>
        <div class="color-picker" id="colorPicker">
          ${PALETTE.map(c=>{
            const isMine = c===initialColor;
            const disabled = takenColors.includes(c) && !isMine;
            return `<button type="button" class="color-swatch ${isMine?'selected':''} ${disabled?'taken':''}" data-color="${c}" style="background:${c}" ${disabled?'disabled title="這個顏色已經被其他團員用了"':''}></button>`;
          }).join('')}
        </div>
      </div>
      <button class="btn btn-accent btn-block" id="saveProfileBtn" style="margin-top:8px">儲存</button>
    </div>
  `;
  document.body.appendChild(overlay);
  let newAvatar = currentProfile.avatar || null;
  let selectedColor = initialColor;

  document.getElementById('closeProfileModal').onclick = ()=>overlay.remove();
  overlay.onclick = (ev)=>{ if(ev.target===overlay) overlay.remove(); };

  document.getElementById('chooseAvatarBtn').onclick = ()=>document.getElementById('avatarInput').click();
  document.getElementById('avatarInput').onchange = (e)=>{
    const file = e.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = (ev)=>{
      const img = new Image();
      img.onload = ()=>{
        const maxW = 320;
        const scale = Math.min(1, maxW/img.width);
        const canvas = document.createElement('canvas');
        canvas.width = img.width*scale;
        canvas.height = img.height*scale;
        canvas.getContext('2d').drawImage(img,0,0,canvas.width,canvas.height);
        newAvatar = canvas.toDataURL('image/jpeg', 0.82);
        document.getElementById('avatarPreview').innerHTML = `<img src="${newAvatar}">`;
      };
      img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
  };

  document.getElementById('colorPicker').querySelectorAll('.color-swatch:not([disabled])').forEach(sw=>{
    sw.onclick = ()=>{
      selectedColor = sw.dataset.color;
      document.getElementById('colorPicker').querySelectorAll('.color-swatch').forEach(s=>s.classList.remove('selected'));
      sw.classList.add('selected');
    };
  });

  document.getElementById('saveProfileBtn').onclick = async ()=>{
    const btn = document.getElementById('saveProfileBtn');
    const displayName = document.getElementById('profileNameInput').value.trim();
    if(!displayName){ alert('請輸入暱稱'); return; }
    btn.disabled = true; btn.textContent = '儲存中…';
    try{
      await db.collection('users').doc(currentUser.uid).update({
        displayName, avatar: newAvatar || null, color: selectedColor
      });
      currentProfile.displayName = displayName;
      currentProfile.avatar = newAvatar || null;
      currentProfile.color = selectedColor;
      const meInMembers = currentMembers.find(m=>isMe(m.uid));
      if(meInMembers){ meInMembers.displayName = displayName; meInMembers.avatar = newAvatar || null; meInMembers.color = selectedColor; }
      renderTopBar();
      overlay.remove();
      if(currentTrip) renderTripDetailView(); else renderTripsView();
    }catch(e){
      alert('更新失敗：'+e.message);
      btn.disabled = false; btn.textContent = '儲存';
    }
  };
}
profileBtn.addEventListener('click', ()=>{ if(currentProfile) openProfileModal(); });

// ------------------------------------------------------------
// 共用小工具
// ------------------------------------------------------------
function esc(s){ return (s||'').toString().replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function fmt(n){ return Number(n||0).toLocaleString('zh-TW', {maximumFractionDigits:0}); }
function nameOf(uid){ const m = currentMembers.find(m=>m.uid===uid); return m ? m.displayName : '未知成員'; }
function isMe(uid){ return currentUser && uid === currentUser.uid; }
function todayStr(){ return new Date().toISOString().slice(0,10); }
function hourOptionsHTML(){
  return Array.from({length:24},(_,h)=>{
    const v = String(h).padStart(2,'0');
    return `<option value="${v}">${v} 時</option>`;
  }).join('');
}
function minOptionsHTML(){
  return Array.from({length:12},(_,i)=>i*5).map(m=>{
    const v = String(m).padStart(2,'0');
    return `<option value="${v}">${v} 分</option>`;
  }).join('');
}
function isMapLink(url){
  if(!url) return false;
  return /google\.[a-z.]+\/maps|maps\.google\.|maps\.app\.goo\.gl|goo\.gl\/maps|\/maps\?|^https?:\/\/maps\./i.test(url);
}
// ------------------------------------------------------------
// 幣別
// ------------------------------------------------------------
const CURRENCIES = [
  {code:'TWD', name:'新台幣', symbol:'NT$'},
  {code:'JPY', name:'日圓',   symbol:'¥'},
  {code:'USD', name:'美金',   symbol:'US$'},
  {code:'EUR', name:'歐元',   symbol:'€'},
  {code:'GBP', name:'英鎊',   symbol:'£'},
  {code:'KRW', name:'韓元',   symbol:'₩'},
  {code:'CNY', name:'人民幣', symbol:'¥'},
  {code:'HKD', name:'港幣',   symbol:'HK$'},
  {code:'SGD', name:'新加坡幣', symbol:'S$'},
  {code:'THB', name:'泰銖',   symbol:'฿'},
  {code:'AUD', name:'澳幣',   symbol:'A$'},
  {code:'CAD', name:'加幣',   symbol:'C$'},
  {code:'CHF', name:'瑞士法郎', symbol:'Fr'},
  {code:'MYR', name:'馬來幣', symbol:'RM'},
  {code:'VND', name:'越南盾', symbol:'₫'}
];
function currencyOf(code){ return CURRENCIES.find(c=>c.code===code) || CURRENCIES[0]; }
function currencySelectHTML(selectedCode, extraClass, extraAttrs){
  const sel = selectedCode || 'TWD';
  return `<select class="${extraClass||''}" ${extraAttrs||''}>${CURRENCIES.map(c=>
    `<option value="${c.code}" ${c.code===sel?'selected':''}>${c.name}（${c.code}）</option>`
  ).join('')}<option value="OTHER" ${sel==='OTHER'?'selected':''}>其他</option></select>`;
}
function fmtCurrency(amount, code, customName){
  if(code==='OTHER') return `${esc(customName || '其他幣別')} ${fmt(amount)}`;
  const c = currencyOf(code);
  return `${c.symbol}${fmt(amount)}`;
}
// 換算成新台幣：非台幣時用匯率（1 單位外幣 = ? 台幣）換算，台幣本身視為匯率 1
function toTWD(amount, code, rate){
  if(!code || code==='TWD') return Number(amount)||0;
  const r = Number(rate);
  return (Number(amount)||0) * (r>0 ? r : 1);
}
function linkIconHTML(url){
  return isMapLink(url)
    ? '<span class="link-ic" title="Google 地圖">🗺️</span>'
    : '<span class="link-ic" title="連結">🔗</span>';
}
function showMsg(boxId, text, type){
  const box = document.getElementById(boxId);
  if(!box) return;
  const el = document.createElement('div');
  el.className = 'message ' + (type||'error');
  el.textContent = text;
  box.prepend(el);
  setTimeout(()=>el.remove(), 4000);
}
function friendlyAuthError(err){
  const map = {
    'auth/email-already-in-use':'這個 email 已經被註冊過了',
    'auth/invalid-email':'email 格式不正確',
    'auth/weak-password':'密碼至少需要 6 個字元',
    'auth/user-not-found':'找不到這個帳號',
    'auth/wrong-password':'密碼錯誤',
    'auth/invalid-credential':'email 或密碼錯誤',
    'auth/too-many-requests':'嘗試太多次了，請稍後再試'
  };
  return map[err.code] || err.message;
}

        <form id="createTripForm">
          <div class="field">
            <label>行程名稱</label>
            <input type="text" id="tripName" placeholder="例如：2026 關西賞楓" required>
          </div>
          <div class="field-row">
            <div class="field"><label>出發日</label><div class="date-wrap"><input type="date" id="tripStart" required></div></div>

          </div>

      </div>

      <div class="card">
        <h2>加入朋友的行程</h2>
        <p class="subtitle" style="margin-bottom:12px">請朋友把行程代碼傳給你，貼在下面</p>
        <form id="joinTripForm" style="display:flex;gap:8px;">
          <input type="text" id="joinCode" placeholder="貼上行程代碼" style="flex:1;padding:10px 12px;border:1px solid var(--border);border-radius:8px;" required>
          <button type="submit" class="btn btn-outline">加入</button>
        </form>
      </div>
    </div>
  `;

  document.getElementById('createTripForm').onsubmit = async (e)=>{
    e.preventDefault();
    const name = document.getElementById('tripName').value.trim();
    const start = document.getElementById('tripStart').value;
    const end = document.getElementById('tripEnd').value;
    try{
      const ref = await db.collection('trips').add({
        name, startDate:start, endDate:end,
        ownerId: currentUser.uid, members:[currentUser.uid],
        createdAt: firebase.firestore.FieldValue.serverTimestamp()
      });
      await openTrip(ref.id);
    }catch(err){
      showMsg('tripsMsgBox', '建立失敗：' + err.message);
    }
  };

  document.getElementById('joinTripForm').onsubmit = async (e)=>{
    e.preventDefault();
    const code = document.getElementById('joinCode').value.trim();
    try{
      const ref = db.collection('trips').doc(code);
      const snap = await ref.get();
      if(!snap.exists){ throw new Error('找不到這個行程代碼，請確認代碼是否正確'); }
      if(!snap.data().members.includes(currentUser.uid)){
        await ref.update({ members: firebase.firestore.FieldValue.arrayUnion(currentUser.uid) });
      }
      await openTrip(code);
    }catch(err){
      showMsg('tripsMsgBox', err.message);
    }
  };

  const snap = await db.collection('trips').where('members','array-contains', currentUser.uid).get();
  const trips = snap.docs.map(d=>({id:d.id, ...d.data()}));
  const listEl = document.getElementById('tripList');
  if(trips.length===0){
    listEl.innerHTML = `<div class="empty-state">還沒有任何行程，建立一個開始規劃吧</div>`;

        <p class="subtitle" style="margin:0">${t.startDate} → ${t.endDate} · ${t.members.length} 位成員</p>
      </div>
      <span class="btn btn-accent" style="pointer-events:none;flex-shrink:0">查看 →</span>
    </div>
  `).join('');
  listEl.querySelectorAll('[data-trip-id]').forEach(card=>{
    card.onclick = ()=>openTrip(card.dataset.tripId);
  });
}

async function openTrip(tripId){
  const snap = await db.collection('trips').doc(tripId).get();
  if(!snap.exists) return;
  currentTrip = {id:snap.id, ...snap.data()};
  currentMembers = [];
  const uniqueUids = [...new Set(currentTrip.members)];
  for(const uid of uniqueUids){
    const uSnap = await db.collection('users').doc(uid).get();
    const data = uSnap.exists ? uSnap.data() : {};
    currentMembers.push({
      uid,
      ...data,
      displayName: data.displayName || data.email || '未命名成員'
    });
  }
  activeTab = 'itinerary';
  await renderTripDetailView();
}

          <div class="field" style="flex:0 0 96px">

async function renderItemsFor(dayId){
  const container = document.querySelector(`[data-items-for="${dayId}"]`);
  if(!container) return;
  const snap = await db.collection('trips').doc(currentTrip.id).collection('days').doc(dayId).collection('items').orderBy('time').get();
  const items = snap.docs.map(d=>({id:d.id, ...d.data()}));
  if(items.length===0){
    container.innerHTML = `<div class="empty-state" style="padding:14px 0">這天還沒有排行程</div>`;
    return;
  }
  container.innerHTML = items.map(it=>`
    <div class="item-row" data-item-row="${it.id}">
      <div class="item-time">${it.time||''}</div>
      <div class="item-body">
        <div class="item-title">${esc(it.title)}</div>
        ${it.note ? `<div class="item-note">${esc(it.note)}</div>` : ''}
        ${it.link ? `<a class="item-link" href="${esc(it.link)}" target="_blank" rel="noopener">${linkIconHTML(it.link)}相關連結 ↗</a>` : ''}
      </div>
      <div class="item-actions">
        <button class="item-btn item-btn-edit" data-item-edit="${it.id}">編輯</button>
        <button class="item-btn item-btn-del" data-del-item="${it.id}">刪除</button>
      </div>
    </div>
  `).join('');
  container.querySelectorAll('[data-del-item]').forEach(btn=>{
    btn.onclick = async ()=>{
      if(!confirm('確定要刪除這筆行程嗎？')) return;
      await db.collection('trips').doc(currentTrip.id).collection('days').doc(dayId).collection('items').doc(btn.dataset.delItem).delete();
      renderItemsFor(dayId);
    };
  });
  container.querySelectorAll('[data-item-edit]').forEach(btn=>{
    btn.onclick = ()=>{
      const item = items.find(x=>x.id===btn.dataset.itemEdit);
      const row = container.querySelector(`[data-item-row="${item.id}"]`);
      const [h, m] = (item.time||'00:00').split(':');
      row.outerHTML = `
        <div class="edit-item-form" data-item-row="${item.id}">
          <div class="field-row">
            <div class="field" style="flex:0 0 96px"><label>時</label><select class="it-hour">${hourOptionsHTML().replace(`value="${h}"`, `value="${h}" selected`)}</select></div>
            <div class="field" style="flex:0 0 96px"><label>分</label><select class="it-min">${minOptionsHTML().replace(`value="${m}"`, `value="${m}" selected`)}</select></div>
            <div class="field" style="flex:2"><label>要去哪裡／做什麼</label><input type="text" class="it-title" value="${esc(item.title)}" required></div>
          </div>
          <div class="field"><label>備註（選填）</label><input type="text" class="it-note" value="${esc(item.note||'')}"></div>
          <div class="field"><label>連結（選填）</label><input type="url" class="it-link" value="${esc(item.link||'')}"></div>
          <div style="display:flex;gap:8px">
            <button class="btn btn-accent it-save" style="flex:1">儲存</button>
            <button class="btn btn-outline it-cancel">取消</button>
          </div>
        </div>
      `;
      const formEl = container.querySelector(`[data-item-row="${item.id}"]`);
      formEl.querySelector('.it-cancel').onclick = ()=>renderItemsFor(dayId);
      formEl.querySelector('.it-save').onclick = async ()=>{
        const hourVal = formEl.querySelector('.it-hour').value;
        const minVal = formEl.querySelector('.it-min').value;
        const title = formEl.querySelector('.it-title').value.trim();
        if(!title){ alert('請輸入標題'); return; }
        await db.collection('trips').doc(currentTrip.id).collection('days').doc(dayId).collection('items').doc(item.id).update({
          time: `${hourVal}:${minVal}`,
          title,
          note: formEl.querySelector('.it-note').value.trim(),
          link: formEl.querySelector('.it-link').value.trim()
        });
        renderItemsFor(dayId);
      };
    };
  });
}

    };

}

// ---------------- 一起出錢（共同分帳） ----------------
function pairwiseDebts(expenses, settlements, members){
  // owed[creditor][debtor] = 這個 debtor 欠這個 creditor 多少錢
  const owed = {};
  function add(creditor, debtor, amt){
    if(creditor===debtor || !amt) return;
    owed[creditor] = owed[creditor] || {};
    owed[creditor][debtor] = (owed[creditor][debtor]||0) + amt;
  }
  expenses.forEach(exp=>{
    const amountTWD = toTWD(exp.amount, exp.currency, exp.exchangeRate);
    if(exp.splitType==='custom' && exp.customSplits){
      const totalShare = Object.values(exp.customSplits).reduce((s,v)=>s+Number(v),0) || 1;
      Object.entries(exp.customSplits).forEach(([uid,share])=>{
        add(exp.payerId, uid, amountTWD * (Number(share)/totalShare));
      });
    } else {
      const share = amountTWD / exp.splitWith.length;
      exp.splitWith.forEach(uid=>{
        add(exp.payerId, uid, share);
      });
    }
  });
  // 已經打勾確認收到的款項：debtor(fromId) 對 creditor(toId) 的欠款減少
  settlements.forEach(s=>{
    add(s.toId, s.fromId, -s.amount);
  });

  const uids = members.map(m=>m.uid);
  const result = [];
  for(let i=0;i<uids.length;i++){
    for(let j=i+1;j<uids.length;j++){
      const a = uids[i], b = uids[j];
      const bOwesA = (owed[a] && owed[a][b]) || 0;
      const aOwesB = (owed[b] && owed[b][a]) || 0;
      const net = Math.round((bOwesA - aOwesB) * 100) / 100;
      if(net > 0.5){
        result.push({from:b, to:a, amount:Math.round(net)});
      } else if(net < -0.5){
        result.push({from:a, to:b, amount:Math.round(-net)});
      }
    }
  }
  return result;
}

      renderExpensesTab(el);

      isPublic: document.getElementById('recPublic').checked,
      userId: currentUser.uid
    });
    renderPersonalTab(el);
  };

  el.querySelectorAll('[data-toggle-record]').forEach(btn=>{
    btn.onclick = async ()=>{
      const willBePublic = btn.dataset.public !== 'true';
      await db.collection('trips').doc(currentTrip.id).collection('personalRecords').doc(btn.dataset.toggleRecord).update({isPublic: willBePublic});
      renderPersonalTab(el);
    };
  });
  el.querySelectorAll('[data-del-record]').forEach(btn=>{
    btn.onclick = async ()=>{
      await db.collection('trips').doc(currentTrip.id).collection('personalRecords').doc(btn.dataset.delRecord).delete();
      renderPersonalTab(el);
    };
  });

  const othersEl = document.getElementById('othersRecordList');
  const others = currentMembers.filter(m=>!isMe(m.uid));
  let html = '';
  for(const m of others){
    const s = await db.collection('trips').doc(currentTrip.id).collection('personalRecords')
      .where('userId','==',m.uid).where('isPublic','==',true).get();
    const records = s.docs.map(d=>({id:d.id, ...d.data()}));
    if(records.length===0) continue;
    html += `<h3 style="font-size:13.5px;margin-top:14px;display:flex;align-items:center;">${avatarChipHTML(m,18)}${esc(m.displayName)}</h3>`;
    html += records.map(r=>`
      <div class="record-row">
        <div><div>${esc(r.title)}</div><div class="record-meta">${r.date}</div></div>
        <div class="expense-amount">${fmtCurrency(r.amount, r.currency, r.customCurrencyName)}</div>
      </div>
    `).join('');
  }
  othersEl.innerHTML = html || `<div class="empty-state">目前沒有其他人公開記帳</div>`;
}

// ---------------- 團員 ----------------
async function renderMembersTab(el){
  el.innerHTML = `
    <div class="card">
      <h2>團員名單</h2>
      <ul class="balance-list">
        ${currentMembers.map(m=>`
          <li>
            <span style="display:flex;align-items:center;">${avatarChipHTML(m,24)}${esc(m.displayName)}${isMe(m.uid)?'（我）':''}${m.uid===currentTrip.ownerId?' · 發起人':''}</span>
            <span class="amount-neutral">${esc(m.email||'')}</span>
          </li>
        `).join('')}
      </ul>
      <p class="subtitle" style="margin-top:14px">把行程代碼「<strong>${currentTrip.id}</strong>」分享給朋友，他們就可以加入這趟旅行。</p>
    </div>
  `;
}

root.innerHTML = `<div class="empty-state">載入中…</div>`;
</script>
